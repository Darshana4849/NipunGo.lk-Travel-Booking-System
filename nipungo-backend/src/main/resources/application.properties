# ============================================================
# NIPUNGO Backend - Application Properties
# ============================================================

# Server
server.port=8080
spring.application.name=nipungo-backend

# ============================================================
# MySQL DataSource - Docker Container
# Host: localhost  Port: 1024  DB: nipungo_db
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:1024/nipungo_db_new?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=NipungoSuperSecretKeyForJWT2024SriLankaTravelPlatformVeryLongAndSecure
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=http://localhost:3000

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# ============================================================
# Logging
# ============================================================
logging.level.com.nipungo=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
